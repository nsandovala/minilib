name: orchestrator
version: "1.0"
integrations:
  amon_agents:
    status: planned
    purpose: reuse planner, qa, security, docs agents

  sentinel_board:
    status: planned
    purpose: visualize tasks, bugs, roadmap and release state
commands:
  - scaffold
  - validate-db
  - review
  - test-gen
  - release
rules:
  - Only execute declared commands
  - Log every execution to agents/logs/YYYY-MM-DD.log
  - Never modify main branch directly
