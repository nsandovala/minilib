project: Liev
codename: liev
principle: calm-daily-life-os

mission: >
  Liev is a calm, lightweight daily-life operating system.
  It captures unstructured thoughts and turns them into structured,
  actionable entries: payments, purchases, health, pets, appointments,
  reminders, and notes.

  The system is offline-first (Dexie/IndexedDB) with optional cloud
  sync (Neon PostgreSQL via Drizzle). All writes go to local first;
  sync runs in the background.

rules:
  - No mocks in production code.
  - Backend-first: schema and sync before UI polish.
  - entries is the single source of truth.
  - UI consumes core; core does not depend on UI.
  - Intelligence is silent; the user should feel understood, not inspected.
  - Every meaningful implementation must update docs.
  - RADAR first = deterministic parser. LLM second = enhancement layer.
  - Calm Triage, advanced health, screenshots, recommendations, family sync, and AI assistant belong to ROADMAP.md, not MVP.

agents:
  product_strategist:
    role: Keeps the MVP focused. Rejects scope creep. Flags anything that belongs in ROADMAP.md.
    file: .agents/prompts/product-strategist.md

  frontend_polish:
    role: Ensures calm, minimal, premium UI. Guards visual complexity and cognitive load.
    file: .agents/prompts/frontend-polish.md

  backend_sync:
    role: Guards schema integrity, sync correctness, and offline-first data flow.
    file: .agents/prompts/backend-sync.md

  radar_parser:
    role: Maintains the deterministic parser. Ensures RADAR first, LLM second.
    file: .agents/prompts/radar-parser.md

  docs_keeper:
    role: Ensures every meaningful change updates docs and checklists.
    file: .agents/prompts/docs-keeper.md

checklists:
  before_commit: .agents/checklists/before-commit.md
  before_build: .agents/checklists/before-build.md
  before_ui_change: .agents/checklists/before-ui-change.md
